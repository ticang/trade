# A 股交易规则 v1 种子集
#
# 置信策略（分层标注）：
#   - 结构性规则（涨跌停/手数/T+N/最小变动）= source_confidence: verified
#     结构权威，可作为回测、限价、手数计算依据。
#   - 费用明细（印花税/过户费/佣金/经手费）= rule_json.fees.*._confidence: provisional
#     费率随政策调整且与券商协定相关，尚未逐项核验生效日期，仅作占位参考，不作实盘费用依据。
#
# 已知留待后续：
#   - ST/*ST 股票 ±5% 限制需基础数据「ST 标记」配合；
#     classify_symbol 仅按 symbol 前缀路由，无法识别 ST 状态，本表仅录入规则值，
#     路由逻辑（symbol→board=st）留待基础数据接入后补。
#   - 可转债临停（涨跌幅 ≥20%/≥30% 触发临停）细节未录入，仅保留涨跌停上限。
#   - 跨境 ETF 实行 T+0 回转，普通 ETF 为 T+1，分别建条。
#
# 区间策略：effective_to 为 null 表示现行；分段规则（如创业板改革前后）区间互斥不重叠。

# ============================================================
# 沪市主板股票
# ============================================================
- rule_id: sse_main_stock
  market: SSE
  board: main
  product_type: stock
  effective_from: 2020-01-01
  effective_to: null
  source_url: http://www.sse.com.cn/
  source_confidence: verified
  rule_json:
    tick: 0.01
    daily_limit_up: 0.10
    daily_limit_down: 0.10
    settlement_T: 1
    min_buy: 100
    lot_increment: 100
    max_order: 1000000
    fees:
      stamp:
        value: 0.0005
        _confidence: provisional
      transfer:
        value: 0.00001
        _confidence: provisional
      commission:
        value: null
        _confidence: provisional
      exchange:
        value: null
        _confidence: provisional
  reviewed_by: null
  reviewed_ts: null

