# A 股交易规则 v1 种子集（当前范围：沪深主板股票）
#
# 置信策略（分层标注）：
#   - 结构性规则（涨跌停/手数/T+1/最小变动）= source_confidence: verified
#     结构权威，可作为回测、限价、手数计算依据。
#   - 公共费用（印花税/过户费/经手费）= rule_json.fees.*._confidence: verified
#     已按 2026-06-16 source audit 核验当前主板股票公共费率。
#   - 券商佣金 = broker_configured
#     不属于公开交易所规则，实盘以券商配置、成交回报和盘后对账为准。
#
# 当前仅录入：
#   - 沪市主板股票
#   - 深市主板股票
#   - 主板 ST/*ST 风险警示股票（需 instrument ST 标记配合路由）
#
# 后续扩展：
#   - 科创板、创业板、北交所、ETF、可转债不进入当前阶段实盘范围；
#     扩展前必须补官方来源快照、人工 golden fixture 与验收。
#
# 区间策略：effective_to 为 null 表示现行。

# ============================================================
# 沪市主板股票
# ============================================================
- rule_id: sse_main_stock
  market: SSE
  board: main
  product_type: stock
  effective_from: 2020-01-01
  effective_to: null
  source_url: https://www.sse.com.cn/lawandrules/sselawsrules2025/trade/universal/c/c_20250612_10781695.shtml
  source_confidence: verified
  rule_json:
    tick: 0.01
    daily_limit_up: 0.10
    daily_limit_down: 0.10
    settlement_T: 1
    min_buy: 100
    lot_increment: 100
    max_order: 1000000
    fees:
      stamp:
        value: 0.0005
        _confidence: verified
      transfer:
        value: 0.00001
        _confidence: verified
      commission:
        value: null
        _confidence: broker_configured
      exchange:
        value: 0.0000341
        _confidence: verified
  reviewed_by: source_audit
  reviewed_ts: 2026-06-16

