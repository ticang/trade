# A 股 instrument 基础数据种子（设计 v0.5 §4.1.3 instrument 路由）
#
# 占位样本：覆盖 ST 时变、可转债、跨境 ETF、普通主板 四类路由场景。
# 真实 AkShare 全市场数据接入留待后续（③）。
#
# 字段对齐 Instrument/StPeriod：
#   symbol/market/board/product_type：分类基础三要素
#   list_date/delist_date/status：生命周期（占位）
#   st_periods：ST 时段序列（start/end 右开，end=null 视为至今 ST）
#     kind: 'ST' | '*ST' | '退市'
#   etf_crossborder：跨境 ETF 标记（影响回转交易 T+N）

# ============================================================
# 沪州主板股票（普通，无 ST）
# ============================================================
- symbol: "600519"
  market: SSE
  board: main
  product_type: stock
  list_date: 2001-08-27
  delist_date: null
  status: active
  st_periods: []
  etf_crossborder: false

# ============================================================
# 沪市主板股票（含一段 ST 时段，用于 ST 路由演示）
# 注：真实 600000（浦发银行）并非 ST，此为占位样本，验证 ST 时变路由。
# ============================================================
- symbol: "600000"
  market: SSE
  board: main
  product_type: stock
  list_date: 1999-11-10
  delist_date: null
  status: active
  st_periods:
    - symbol: "600000"
      start: 2020-01-01
      end: 2022-12-31
      kind: ST
  etf_crossborder: false

# ============================================================
# 可转债（沪市，BOND/bond/bond）
# ============================================================
- symbol: "113001"
  market: BOND
  board: bond
  product_type: bond
  list_date: 2010-01-01
  delist_date: null
  status: active
  st_periods: []
  etf_crossborder: false

# ============================================================
# 跨境 ETF（沪市，T+0 回转，board 路由至 etp_crossborder）
# ============================================================
- symbol: "510900"
  market: ETF
  board: etp
  product_type: fund
  list_date: 2012-05-28
  delist_date: null
  status: active
  st_periods: []
  etf_crossborder: true
